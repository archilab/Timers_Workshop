<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: #f2f2f2; stroke: #333; stroke-width: 2; }
    .text { font-family: Arial, sans-serif; font-size: 14px; fill: #000; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
    refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Boxes -->
  <rect x="50" y="100" width="200" height="100" class="box"/>
  <rect x="300" y="100" width="200" height="100" class="box"/>
  <rect x="550" y="100" width="200" height="100" class="box"/>

  <!-- Text -->
  <text x="150" y="130" class="text">INPUT</text>
  <text x="150" y="155" class="text">Sensor</text>
  <text x="150" y="175" class="text">z.B. Abstand / Bewegung</text>

  <text x="400" y="130" class="text">TRANSFORMATION</text>
  <text x="400" y="155" class="text">Mapping / Logik</text>
  <text x="400" y="175" class="text">z.B. Skalierung / Threshold</text>

  <text x="650" y="130" class="text">OUTPUT</text>
  <text x="650" y="155" class="text">Aktoren</text>
  <text x="650" y="175" class="text">z.B. Licht / Servo / Sound</text>

  <!-- Arrows -->
  <line x1="250" y1="150" x2="300" y2="150" class="arrow"/>
  <line x1="500" y1="150" x2="550" y2="150" class="arrow"/>
</svg>
